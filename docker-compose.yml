# docus —— 生产部署。
#
#   docker compose up -d --build
#
# SQLite 数据库（./data）和 markdown 笔记库（./src/content）都持久化在宿主机上。
# 密钥（ANTHROPIC_*）从宿主机的 .env 文件读 —— 可配置的变量见 .env.example，
# 启动前把它的副本改名为 .env。

services:
  docus:
    build:
      context: .
      dockerfile: Dockerfile
    image: docus:latest
    container_name: docus
    restart: unless-stopped

    # SPA 和 /api/* 走同一个端口。Hono 产线入口（server/prod.ts）把 /api/* 路由到 app，
    # 其它路径回落到 index.html（SPA history 模式需要）。
    ports:
      - "${DOCS_PORT:-3000}:3000"

    env_file:
      - .env

    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      # 透传 LLM 配置：.env 里其实已经把这些值注入进程了，这里再列一遍是把契约写明确。
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}

    volumes:
      # SQLite 数据库 + WAL 放在镜像外面，容器重建时不会把聊天记录一起清掉。
      - docus-data:/app/data
      # 笔记库本体：用命名卷让笔记和宿主机文件系统解耦。如果想用本地编辑器直接改笔记，
      # 可以换成 bind mount ./src/content —— 切换方法见下面"实时编辑模式"块。
      - docus-content:/app/src/content

    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # 多重加固：降权、把根 FS 设成只读（除了那两条可写路径），再把可写路径重新打开。
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    user: "1000:1000"

volumes:
  docus-data:
  docus-content:

# ---------------------------------------------------------------------------
# 实时编辑模式（把笔记库挂回宿主机）
# ---------------------------------------------------------------------------
# 如果你更想把笔记库放在宿主机上（比如方便本地编辑器直接写入），把上面这行：
#
#     - docus-content:/app/src/content
#
# 替换成：
#
#     - ./src/content:/app/src/content:rw
#
# 容器如果发现 ./src/content 不存在会自己建一个空目录 —— 提前 `mkdir -p src/content` 也行。
# ---------------------------------------------------------------------------
