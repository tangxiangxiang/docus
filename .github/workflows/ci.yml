name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run complete unit and integration suite
        run: npm test

      - name: Run crash recovery suite twice
        run: |
          node node_modules/vitest/vitest.mjs run server/__tests__/crashRecovery.test.ts server/__tests__/atomicTextWrite.test.ts server/__tests__/documentFileLifecycle.test.ts server/__tests__/createOnlyMove.test.ts
          node node_modules/vitest/vitest.mjs run server/__tests__/crashRecovery.test.ts server/__tests__/atomicTextWrite.test.ts server/__tests__/documentFileLifecycle.test.ts server/__tests__/createOnlyMove.test.ts

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Run cross-platform browser E2E
        run: node node_modules/@playwright/test/cli.js test --config=playwright.cross-platform.config.ts

      - name: Run Draft Store browser E2E
        run: npm run test:e2e:draft-store

  visual:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - name: Run macOS visual baselines
        run: node node_modules/@playwright/test/cli.js test e2e/markdown-visual.spec.ts
